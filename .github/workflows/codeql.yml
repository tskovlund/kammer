# CodeQL via the shared reusable workflow (tskovlund/.github) — one
# SHA-pinned maintenance point for all repos. Elixir is not a CodeQL
# language, so coverage is the JavaScript (assets, service worker,
# vendored plugins) and the GitHub Actions workflows themselves; Elixir
# security scanning is Sobelow + mix deps.audit in ci.yml.
#
# Note: code-scanning upload requires a public repository or GitHub
# Advanced Security on private ones.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    uses: tskovlund/.github/.github/workflows/codeql.yml@main
    with:
      language: ${{ matrix.language }}
    permissions:
      contents: read
      security-events: write
      actions: read
