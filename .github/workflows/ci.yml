name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Markdown/JSON/YAML formatting (account-wide convention); Elixir and
  # HEEx formatting is checked by mix format in the checks job.
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - run: npx prettier@3 --check .

  commitlint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install commitlint
        run: npm install --no-audit --no-fund
        working-directory: tooling/commitlint
      - name: Lint commit messages
        run: >
          npx --prefix tooling/commitlint commitlint
          --config tooling/commitlint/commitlint.config.mjs
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  checks:
    name: Format, Credo, Sobelow, audit, Dialyzer, tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      # The flake is the single source of truth for the toolchain: CI runs
      # every command inside the same dev shell contributors use locally.
      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Cache Mix dependencies and build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            .nix-mix
            .nix-hex
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v6
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ hashFiles('mix.lock', 'flake.lock') }}
          restore-keys: plt-${{ runner.os }}-

      - name: Install Hex and rebar
        run: nix develop --command bash -c "mix local.hex --force && mix local.rebar --force"

      - name: Fetch dependencies
        run: nix develop --command mix deps.get

      - name: Compile (warnings as errors)
        run: nix develop --command mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Check formatting
        run: nix develop --command mix format --check-formatted

      - name: Credo (strict)
        run: nix develop --command mix credo --strict

      - name: Sobelow security scan
        run: nix develop --command mix sobelow --config

      - name: Audit dependencies
        run: nix develop --command bash -c "mix hex.audit && mix deps.audit"

      - name: Dialyzer
        run: nix develop --command mix dialyzer --format github

      - name: Tests with coverage floor
        run: nix develop --command mix coveralls
        env:
          MIX_ENV: test

  # End-to-end smoke test: boots a real instance and drives the actual
  # product flows (wizard, invite signups, posts, poll, event, files) in
  # a headless browser — the same script that generates the README
  # screenshots. The captured screenshots are uploaded as workflow
  # artifacts so reviewers can eyeball the UI on any PR; committing them
  # stays a deliberate, human-reviewed act (see docs/development.md).
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Cache Mix dependencies and build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            .nix-mix
            .nix-hex
          key: mix-dev-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-dev-${{ runner.os }}-

      - name: Install Hex and rebar
        run: nix develop --command bash -c "mix local.hex --force && mix local.rebar --force"

      - name: Fetch dependencies
        run: nix develop --command mix deps.get

      - name: Compile and build assets
        run: nix develop --command bash -c "mix compile && mix assets.setup && mix assets.build"

      - name: Drive the real flows and capture screenshots
        run: nix develop --command bash scripts/screenshots.sh
        env:
          # The runner's preinstalled Chrome; Playwright only drives it.
          CHROMIUM_BIN: /usr/bin/google-chrome

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: docs/screenshots/
          if-no-files-found: error
