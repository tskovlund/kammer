# Fails PRs that introduce dependencies with known vulnerabilities or
# incompatible licenses. Requires the dependency graph (on by default
# for public repositories).
name: Dependency review

on: pull_request

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
