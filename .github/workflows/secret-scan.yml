# Gitleaks secret scanning over the full history on every push/PR plus a
# weekly sweep. Complements GitHub's own secret scanning + push
# protection (enable those in Settings → Code security, see
# docs/github/repo-settings.md). Gitleaks is free for personal
# repositories; an organisation would need GITLEAKS_LICENSE.
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
