# Builds the release image on every PR (the Dockerfile is a deliverable
# — SPEC §14 — so it must never rot) and publishes to GHCR on main and
# on version tags.
name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build (and push on main/tags)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boot the exact image that was just built: migrations run on start
      # (bin/server calls Kammer.Release.migrate), so a 200 from /healthz
      # proves the shipped artifact boots, connects, and migrates. The /app
      # checks prove the bundled PWA (issue #176) actually shipped: the
      # SPA's index.html answers both at the base path and for deep client
      # routes (the magic-link landing shape).
      - name: Boot check (/healthz + /app)
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker network create kammer-smoke
          docker run -d --name db --network kammer-smoke \
            -e POSTGRES_USER=kammer -e POSTGRES_PASSWORD=kammer -e POSTGRES_DB=kammer \
            --health-cmd "pg_isready -U kammer" --health-interval 2s --health-retries 15 \
            postgres:16
          until [ "$(docker inspect -f '{{.State.Health.Status}}' db)" = healthy ]; do sleep 2; done
          docker run -d --name app --network kammer-smoke -p 4000:4000 \
            -e DATABASE_URL=ecto://kammer:kammer@db/kammer \
            -e SECRET_KEY_BASE=$(openssl rand -base64 48) \
            -e PHX_HOST=localhost -e MAILER_ADAPTER=local \
            "$IMAGE"
          healthy=false
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4000/healthz >/dev/null 2>&1; then
              healthy=true && break
            fi
            sleep 2
          done
          if [ "$healthy" != true ]; then
            echo "app never became healthy" >&2
            docker logs app >&2
            exit 1
          fi
          echo "healthz OK"
          curl -fsS http://localhost:4000/app | grep -qi '<!doctype html>' \
            || { echo "/app did not serve the PWA index" >&2; exit 1; }
          curl -fsS http://localhost:4000/app/sign-in/smoke-test-token | grep -qi '<!doctype html>' \
            || { echo "/app deep link did not fall back to index.html" >&2; exit 1; }
          echo "PWA OK"
